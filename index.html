<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
  <title>Phoenix Mobile – Tugyi v3.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',sans-serif;background-color:#050505;background-image:radial-gradient(at 0% 0%,hsla(253,16%,7%,1) 0,transparent 50%),radial-gradient(at 50% 0%,hsla(225,39%,30%,0.4) 0,transparent 50%),radial-gradient(at 100% 0%,hsla(339,49%,30%,0.4) 0,transparent 50%);background-attachment:fixed;min-height:100vh;overflow-x:hidden;color:white;-webkit-font-smoothing:antialiased}
    .page{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;overflow:hidden}
    .bg-orb{position:absolute;border-radius:9999px;mix-blend-mode:screen;filter:blur(80px);opacity:0.5;animation:pulse-orb 8s ease-in-out infinite}
    .orb-purple{width:256px;height:256px;background:#7c3aed;top:25%;left:-40px;animation-delay:0s}
    .orb-blue{width:288px;height:288px;background:#2563eb;bottom:25%;right:-40px;animation-delay:2s}
    .orb-indigo{width:192px;height:192px;background:#6366f1;top:50%;left:33%;animation-delay:4s}
    @keyframes pulse-orb{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.7;transform:scale(1.05)}}
    .phone-wrap{position:relative;width:100%;max-width:420px;margin:0 auto;z-index:10;animation:fade-up 0.7s cubic-bezier(0.22,1,0.36,1) both}
    @keyframes fade-up{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
    .glass-panel{background:rgba(255,255,255,0.08);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.18);box-shadow:0 8px 32px 0 rgba(0,0,0,0.37);border-radius:2rem;min-height:750px;padding:1.5rem;display:flex;flex-direction:column}
    .header{padding:1.5rem 0 1rem;text-align:center}
    .phoenix-wrap{position:relative;width:160px;height:160px;margin:0 auto 0.75rem;display:flex;align-items:center;justify-content:center;animation:scale-in 0.7s 0.15s cubic-bezier(0.22,1,0.36,1) both}
    @keyframes scale-in{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
    .phoenix-glow-outer{position:absolute;inset:-28px;border-radius:9999px;background:radial-gradient(circle,rgba(255,190,0,0.18) 0%,rgba(255,120,0,0.09) 55%,transparent 75%);animation:phoenix-pulse 3s ease-in-out infinite;animation-delay:0.4s;filter:blur(22px)}
    .phoenix-glow{position:absolute;inset:8px;border-radius:9999px;background:radial-gradient(circle,rgba(255,215,0,0.28) 0%,rgba(255,140,0,0.13) 55%,transparent 75%);animation:phoenix-pulse 3s ease-in-out infinite;filter:blur(10px)}
    @keyframes phoenix-pulse{0%,100%{opacity:0.45;transform:scale(0.91)}50%{opacity:1;transform:scale(1.08)}}
    .phoenix-img{position:relative;z-index:2;width:155px;height:155px;object-fit:contain;border-radius:50%;animation:phoenix-glow-svg 3s ease-in-out infinite}
    @keyframes phoenix-glow-svg{0%,100%{filter:drop-shadow(0 0 6px rgba(255,200,0,0.9)) drop-shadow(0 0 18px rgba(255,140,0,0.55))}50%{filter:drop-shadow(0 0 14px rgba(255,220,0,1)) drop-shadow(0 0 36px rgba(255,160,0,0.95))}}
    h1{font-size:1.5rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:.25rem}
    h2{font-size:1.1rem;font-weight:500;color:rgba(255,255,255,0.6)}
    .badge-wrap{display:flex;justify-content:center;margin-bottom:1.75rem}
    .status-badge{display:inline-flex;align-items:center;gap:.5rem;padding:.375rem .75rem;border-radius:9999px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);font-size:.75rem;font-weight:500;color:#6ee7b7}
    .dot-wrap{position:relative;display:flex;width:8px;height:8px}
    .dot-ping{position:absolute;inset:0;border-radius:9999px;background:#34d399;opacity:.75;animation:ping 1.2s cubic-bezier(0,0,0.2,1) infinite}
    .dot-core{position:relative;width:8px;height:8px;border-radius:9999px;background:#10b981}
    @keyframes ping{75%,100%{transform:scale(2);opacity:0}}
    .main-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;gap:1.5rem}
    .btn-generate{position:relative;overflow:hidden;width:100%;display:flex;flex-direction:row;align-items:center;justify-content:center;gap:1rem;padding:1.25rem 2.5rem;background:rgba(255,255,255,0.10);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.25);border-radius:0.75rem;box-shadow:0 8px 32px 0 rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.2);cursor:pointer;color:white;font-family:inherit;transition:background .3s,border-color .3s,box-shadow .3s,transform .3s;animation:pulse-glow 3s ease-in-out infinite}
    .btn-generate::before{content:'';position:absolute;inset:0;border-radius:0.75rem;background:linear-gradient(to bottom,rgba(255,255,255,0.15),transparent);pointer-events:none}
    .btn-generate:hover:not(:disabled){background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.35);transform:translateY(-2px) scale(1.01)}
    .btn-generate:active:not(:disabled){transform:translateY(0) scale(0.98)}
    .btn-generate:disabled{opacity:.6;cursor:not-allowed}
    .btn-generate span{font-size:1rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.92)}
    @keyframes pulse-glow{0%,100%{box-shadow:0 0 15px 2px rgba(255,255,255,0.18),0 8px 32px 0 rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.22)}50%{box-shadow:0 0 30px 8px rgba(255,255,255,0.35),0 8px 32px 0 rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.3);border-color:rgba(255,255,255,0.48)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{animation:spin 1s linear infinite}
    .result-view{width:100%;display:flex;flex-direction:column;align-items:center;animation:fade-up .4s ease both}
    .qr-container{position:relative;padding:1.5rem;background:white;border-radius:1.5rem;box-shadow:0 0 40px rgba(255,255,255,0.15);margin-bottom:1.5rem}
    .qr-container::after{content:'';position:absolute;inset:0;border-radius:1.5rem;background:linear-gradient(135deg,rgba(255,255,255,0.4),transparent);border:1px solid rgba(255,255,255,0.5);pointer-events:none}
    #qrcode canvas,#qrcode img{border-radius:.5rem;display:block}
    .btn-gap{display:flex;flex-direction:column;gap:.75rem;width:100%}
    .btn-action{position:relative;overflow:hidden;width:100%;display:flex;align-items:center;justify-content:center;gap:.75rem;padding:1rem 2rem;background:rgba(255,255,255,0.10);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.25);border-radius:0.75rem;box-shadow:0 8px 32px 0 rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.2);cursor:pointer;color:white;font-family:inherit;font-size:1rem;font-weight:600;transition:background .3s,border-color .3s,box-shadow .3s,transform .3s}
    .btn-action::before{content:'';position:absolute;inset:0;border-radius:0.75rem;background:linear-gradient(to bottom,rgba(255,255,255,0.15),transparent);pointer-events:none}
    .btn-action:hover{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.35);transform:translateY(-2px)}
    .btn-action:active{transform:translateY(0) scale(0.98)}
    .btn-action.downloaded{background:rgba(16,185,129,0.18);border-color:rgba(16,185,129,0.4)}
    .btn-action.copied{background:rgba(99,102,241,0.2);border-color:rgba(99,102,241,0.45)}
    .btn-reset{margin-top:.5rem;padding:.5rem 1.5rem;background:none;border:none;cursor:pointer;font-size:.875rem;font-weight:500;color:rgba(255,255,255,0.45);font-family:inherit;transition:color .2s}
    .btn-reset:hover{color:rgba(255,255,255,0.9)}
    .footer{padding-top:1.25rem;margin-top:auto;text-align:center;border-top:1px solid rgba(255,255,255,0.1)}
    .footer-inner{display:inline-flex;align-items:center;gap:.375rem;font-size:.75rem;color:rgba(255,255,255,0.35)}
    #toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(20,20,30,0.95);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.15);border-radius:.75rem;padding:.75rem 1.25rem;font-size:.875rem;color:white;box-shadow:0 8px 32px rgba(0,0,0,0.4);transition:transform .35s cubic-bezier(0.22,1,0.36,1),opacity .35s;opacity:0;z-index:999;white-space:nowrap}
    #toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    #toast.error{border-color:rgba(239,68,68,0.4);color:#fca5a5}
    #toast.success{border-color:rgba(99,102,241,0.4);color:#c7d2fe}
    .hidden{display:none!important}
  </style>
</head>

<script>
let configData = null;

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = (type ? type+' ' : '')+'show';
  setTimeout(() => { t.className = type||''; }, 3200);
}

async function handleGenerate() {
  const btn = document.getElementById('btn-generate');
  btn.disabled = true;
  document.getElementById('icon-zap').classList.add('hidden');
  document.getElementById('icon-spin').classList.remove('hidden');
  document.getElementById('btn-label').textContent = 'Generating...';
  try {
    const res = await fetch('/.netlify/functions/generate', {
      method: 'POST',
      headers: {'Content-Type':'application/json'}
    });
    if (!res.ok) {
      let msg = 'Failed to generate';
      try { const d = await res.json(); msg = d.message||msg; } catch(_){}
      throw new Error(msg);
    }
    const data = await res.json();
    configData = data.config;
    const qrDiv = document.getElementById('qrcode');
    qrDiv.innerHTML = '';
    new QRCode(qrDiv, {text:configData,width:220,height:220,colorDark:'#09090b',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
    resetDownloadBtn();
    document.getElementById('view-generate').classList.add('hidden');
    document.getElementById('view-result').classList.remove('hidden');
  } catch(err) {
    showToast(err.message||'Failed','error');
  } finally {
    btn.disabled = false;
    document.getElementById('icon-zap').classList.remove('hidden');
    document.getElementById('icon-spin').classList.add('hidden');
    document.getElementById('btn-label').textContent = 'Generate WGCF';

<div id="toast"></div>
<script>
let configData = null;

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = (type ? type+' ' : '')+'show';
  setTimeout(() => { t.className = type||''; }, 3200);
}

async function handleGenerate() {
  const btn = document.getElementById('btn-generate');
  btn.disabled = true;
  document.getElementById('icon-zap').classList.add('hidden');
  document.getElementById('icon-spin').classList.remove('hidden');
  document.getElementById('btn-label').textContent = 'Generating...';
  try {
    const res = await fetch('/.netlify/functions/generate', {
      method: 'POST',
      headers: {'Content-Type':'application/json'}
    });
    if (!res.ok) {
      let msg = 'Failed to generate';
      try { const d = await res.json(); msg = d.message||msg; } catch(_){}
      throw new Error(msg);
    }
    const data = await res.json();
    configData = data.config;
    const qrDiv = document.getElementById('qrcode');
    qrDiv.innerHTML = '';
    new QRCode(qrDiv, {text:configData,width:220,height:220,colorDark:'#09090b',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
    resetDownloadBtn(); resetCopyBtn();
    document.getElementById('view-generate').classList.add('hidden');
    document.getElementById('view-result').classList.remove('hidden');
  } catch(err) {
    showToast(err.message||'Failed','error');
  } finally {
    btn.disabled = false;
    document.getElementById('icon-zap').classList.remove('hidden');
    document.getElementById('icon-spin').classList.add('hidden');
    document.getElementById('btn-label').textContent = 'Generate WGCF';
  }
}

function handleDownload() {
  if (!configData) return;
  try {
    const blob = new Blob([configData],{type:'application/octet-stream'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download='phoenix-tugyi.conf';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    document.getElementById('btn-download').classList.add('downloaded');
    document.getElementById('icon-dl').classList.add('hidden');
    document.getElementById('icon-dl-ok').classList.remove('hidden');
    const lbl = document.getElementById('dl-label');
    lbl.textContent='Downloaded!'; lbl.style.color='#a7f3d0';
    showToast('Downloaded phoenix-tugyi.conf','');
  } catch(err){ showToast('Download failed','error'); }
}

async function handleCopy() {
  if (!configData) return;
  try {
    await navigator.clipboard.writeText(configData);
    document.getElementById('btn-copy').classList.add('copied');
    document.getElementById('icon-copy').classList.add('hidden');
    document.getElementById('icon-copy-ok').classList.remove('hidden');
    const lbl = document.getElementById('copy-label');
    lbl.textContent='Copied!'; lbl.style.color='#a5b4fc';
    showToast('Config copied!','success');
    setTimeout(()=>{ resetCopyBtn(); },3000);
  } catch(err){ showToast('Copy failed','error'); }
}

function resetDownloadBtn() {
  document.getElementById('btn-download').className='btn-action';
  document.getElementById('icon-dl').classList.remove('hidden');
  document.getElementById('icon-dl-ok').classList.add('hidden');
  const lbl=document.getElementById('dl-label'); lbl.textContent='Download .conf'; lbl.style.color='white';
}
function resetCopyBtn() {
  document.getElementById('btn-copy').className='btn-action';
  document.getElementById('icon-copy').classList.remove('hidden');
  document.getElementById('icon-copy-ok').classList.add('hidden');
  const lbl=document.getElementById('copy-label'); lbl.textContent='Copy Config'; lbl.style.color='white';
}
function handleReset() {
  configData=null;
  document.getElementById('qrcode').innerHTML='';
  document.getElementById('view-result').classList.add('hidden');
  document.getElementById('view-generate').classList.remove('hidden');
}
</script>
